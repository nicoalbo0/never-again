services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: never-again
      POSTGRES_PASSWORD: never-again
      POSTGRES_DB: never-again
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U never-again"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8742:8742"
    environment:
      NEVER_AGAIN_STORE: postgres
      NEVER_AGAIN_DB: postgresql+asyncpg://never-again:never-again@postgres:5432/never-again
      NEVER_AGAIN_TEAM: local
      NEVER_AGAIN_EMBEDDER: ollama
      NEVER_AGAIN_EMBED_DIMENSION: 768
      OLLAMA_URL: http://host.docker.internal:11434
      OLLAMA_EMBED_MODEL: nomic-embed-text
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ..:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
